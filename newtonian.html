<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Newtonian Sandbox</title><style>body{margin:0;background:#050608;color:#eee9df;font:15px system-ui;overflow:hidden}header{height:52px;background:#08090b;border-bottom:1px solid #2b3342;display:flex;align-items:center;gap:14px;padding:0 16px}a{color:#8bd3e6;text-decoration:none}.wrap{display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 52px)}aside{background:#11151d;border-right:1px solid #2b3342;padding:16px;overflow:auto}canvas{width:100%;height:100%;display:block}.stage{position:relative}.hud{position:absolute;left:12px;bottom:12px;background:#0009;border:1px solid #2b3342;border-radius:12px;padding:10px;color:#aaa}.eq{white-space:pre-wrap;background:#050608;border:1px solid #2b3342;border-radius:12px;padding:12px;color:#d9edf2;font-family:monospace}button{background:#0b1018;color:#eee9df;border:1px solid #2b3342;border-radius:9px;padding:8px;margin:4px}h1{font:400 22px Georgia,serif;margin:0}</style></head><body><header><a href="simulator.html">← Launcher</a><h1>Known-Universe Newtonian Sandbox</h1></header><div class="wrap"><aside><p>This page is the conventional-physics lane only. It uses a simple inverse-square N-body toy model.</p><button id="play">Pause</button><button id="reset">Reset</button><button id="kick">Perturb</button><h3>Equations</h3><div class="eq">a_i = sum_j G*m_j*(r_j-r_i)/|r_j-r_i|^3
v += a*dt
x += v*dt
G = 4*pi^2</div></aside><main class="stage"><canvas id="c"></canvas><div id="hud" class="hud"></div></main></div><script>const G=4*Math.PI*Math.PI,T=Math.PI*2,c=document.getElementById('c'),g=c.getContext('2d');let B=[],R=[],run=true,t=0;function resize(){c.width=c.clientWidth*devicePixelRatio;c.height=c.clientHeight*devicePixelRatio;g.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0)}addEventListener('resize',resize);function init(){B=[{m:1,x:0,y:0,vx:0,vy:0,r:11,col:'#d6b36a'}];R=[];[[.5,1e-6,0],[1,3e-6,1.4],[1.6,4e-7,2.8],[2.4,2e-4,4]].forEach(d=>{let a=d[0],m=d[1],p=d[2],v=Math.sqrt(G/a);B.push({m:m,x:Math.cos(p)*a,y:Math.sin(p)*a,vx:-Math.sin(p)*v,vy:Math.cos(p)*v,r:4,col:'#8bd3e6'});R.push([])});t=0}function acc(i){let a=B[i],ax=0,ay=0;for(let j=0;j<B.length;j++){if(i===j)continue;let b=B[j],dx=b.x-a.x,dy=b.y-a.y,r2=dx*dx+dy*dy+1e-7,r=Math.sqrt(r2),s=G*b.m/(r2*r);ax+=dx*s;ay+=dy*s}return[ax,ay]}function step(){let dt=.003,A=B.map((_,i)=>acc(i));B.forEach((b,i)=>{b.vx+=A[i][0]*dt;b.vy+=A[i][1]*dt;b.x+=b.vx*dt;b.y+=b.vy*dt});for(let i=1;i<B.length;i++){R[i-1].push({x:B[i].x,y:B[i].y});if(R[i-1].length>320)R[i-1].shift()}t++}function sc(){return Math.min(c.clientWidth,c.clientHeight)/7}function X(v){return c.clientWidth/2+v*sc()}function Y(v){return c.clientHeight/2+v*sc()}function draw(){g.fillStyle='#030407';g.fillRect(0,0,c.clientWidth,c.clientHeight);R.forEach(r=>{g.beginPath();r.forEach((p,i)=>i?g.lineTo(X(p.x),Y(p.y)):g.moveTo(X(p.x),Y(p.y)));g.strokeStyle='#8bd3e655';g.stroke()});B.forEach(b=>{g.beginPath();g.arc(X(b.x),Y(b.y),b.r,0,T);g.fillStyle=b.col;g.fill()});hud.textContent='Newtonian engine only | t='+t}function loop(){if(run)for(let i=0;i<4;i++)step();draw();requestAnimationFrame(loop)}play.onclick=()=>{run=!run;play.textContent=run?'Pause':'Play'};reset.onclick=init;kick.onclick=()=>B.slice(1).forEach(b=>{b.vx+=(Math.random()-.5)*.5;b.vy+=(Math.random()-.5)*.5});resize();init();loop()</script></body></html>
